<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Spice Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout d-flex">
      <aside class="sidebar p-3">
        <div class="brand mb-4">Spice Admin Panel</div>
        <nav class="nav flex-column">
          <a class="nav-link" data-page="dashboard.html" href="dashboard.html">Dashboard</a>
          <a class="nav-link" data-page="products.html" href="products.html">Products</a>
          <a class="nav-link" data-page="orders.html" href="orders.html">Orders</a>
          <a class="nav-link" data-page="users.html" href="users.html">Users</a>
          <a class="nav-link logout-btn" href="#">Logout</a>
        </nav>
      </aside>

      <main class="content-area">
        <nav class="topbar d-flex justify-content-between align-items-center px-4 py-3">
          <h5 class="mb-0">Products</h5>
          <button class="btn btn-outline-danger btn-sm logout-btn">Logout</button>
        </nav>

        <section class="p-4">
          <div class="card table-card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="mb-0">Product Management</h6>
              <button class="btn btn-primary btn-sm" id="addProductBtn">Add Product</button>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Name</th>
                    <th>Prices</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody id="productsTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalLabel">Add Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="productForm">
              <input type="hidden" id="editProductId" />
              <div class="mb-3">
                <label class="form-label" for="productName">Name</label>
                <input type="text" class="form-control" id="productName" required />
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label" for="price250">250g</label>
                  <input type="number" min="1" class="form-control" id="price250" required />
                </div>
                <div class="col-6">
                  <label class="form-label" for="price500">500g</label>
                  <input type="number" min="1" class="form-control" id="price500" required />
                </div>
                <div class="col-6">
                  <label class="form-label" for="price750">750g</label>
                  <input type="number" min="1" class="form-control" id="price750" required />
                </div>
                <div class="col-6">
                  <label class="form-label" for="price1kg">1kg</label>
                  <input type="number" min="1" class="form-control" id="price1kg" required />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary btn-sm" id="saveProductBtn">Save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3 toast-wrap" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
