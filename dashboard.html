<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Spice Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout d-flex">
      <aside class="sidebar p-3">
        <div class="brand mb-4">Spice Admin Panel</div>
        <nav class="nav flex-column">
          <a class="nav-link" data-page="dashboard.html" href="dashboard.html">Dashboard</a>
          <a class="nav-link" data-page="products.html" href="products.html">Products</a>
          <a class="nav-link" data-page="orders.html" href="orders.html">Orders</a>
          <a class="nav-link" data-page="users.html" href="users.html">Users</a>
          <a class="nav-link logout-btn" href="#">Logout</a>
        </nav>
      </aside>

      <main class="content-area">
        <nav class="topbar d-flex justify-content-between align-items-center px-4 py-3">
          <h5 class="mb-0">Dashboard</h5>
          <button class="btn btn-outline-danger btn-sm logout-btn">Logout</button>
        </nav>

        <section class="p-4">
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="card summary-card p-3">
                <div class="text-muted">Total Products</div>
                <div class="value" id="totalProducts">0</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card summary-card p-3">
                <div class="text-muted">Total Orders</div>
                <div class="value" id="totalOrders">0</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card summary-card p-3">
                <div class="text-muted">Total Revenue</div>
                <div class="value" id="totalRevenue">Rs. 0</div>
              </div>
            </div>
          </div>

          <div class="card table-card p-3">
            <h6 class="mb-3">Recent Orders</h6>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="recentOrdersBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3 toast-wrap" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
