<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spice Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-bg">
    <div class="container py-5">
      <div class="row justify-content-center align-items-center" style="min-height: 90vh">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
          <div class="card auth-card p-4">
            <h3 class="text-center mb-3">Spice Admin</h3>
            <p class="text-center text-muted mb-4">Login to manage products and orders</p>
            <form id="loginForm">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required />
              </div>
              <div id="loginError" class="alert alert-danger d-none py-2" role="alert">
                Invalid credentials. Use admin / admin123.
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
